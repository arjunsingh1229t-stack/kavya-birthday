<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Kavya 🎉</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
overflow:hidden;
}

h1{
margin-top:20%;
font-size:50px;
animation: glow 1s infinite alternate;
}

@keyframes glow{
from{color:#ff0080;}
to{color:#00ffff;}
}

.balloon{
position:absolute;
bottom:-100px;
font-size:40px;
animation: float 6s infinite;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}
</style>

</head>

<body>

<h1>🎉 Happy Birthday Kavya 🎉</h1>

<div class="balloon" style="left:10%">🎈</div>
<div class="balloon" style="left:30%">🎈</div>
<div class="balloon" style="left:50%">🎈</div>
<div class="balloon" style="left:70%">🎈</div>
<div class="balloon" style="left:90%">🎈</div>

</body>
</html>
